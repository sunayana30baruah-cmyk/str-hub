    .block-purple { background: #FDF4FF; border: 1px solid #E9D5FF; color: #6B21A8; }

  tjx:         { name:"TJX Companies", shortName:"TJX Companies", ae:"Michael Tarter", color:"#E65100", colorLight:"#FBE9E7", competitor:"Unknown (lost survey RFP)", dealStage:"Re-Engage", closeTarget:"Q2-Q3 2026", engagementScore:2, contacts:{total:0,liValidated:0,working:0,converted:0,keyContacts:["CMO (via founder connection)","Head of Consumer Insights (via founder connection)"]}, nextAction:{text:"Michael to re-engage CMO + Consumer Insights post-Q4 earnings with AI survey summaries story.",owner:"Michael Tarter + ABM",dueDate:"Mar 31"}, outreachDraft:{channel:"Email",sender:"Michael Tarter",body:"Hi [First Name],\n\nCongrats on a strong Q4 — the results speak for themselves.\n\nI've been thinking about the survey conversation we had previously. At 4,900+ stores, the only way to make sense of location-level customer feedback is AI — and that's exactly what Birdeye's survey summaries do.\n\nWould you be open to a quick look?"} }
};

const ACCOUNT_ORDER = ["pds","multicare","fullspeed","advocate","moneygram","drhorton","fiveguys","adventist","cedars","ccm","willowbridge","tjx"];

const URGENCY = {
  "ACT NOW":{bg:"#FEF2F2",text:"#991B1B",dot:"#EF4444",border:"#FECACA"},
  "WATCH":  {bg:"#FFFBEB",text:"#92400E",dot:"#F59E0B",border:"#FDE68A"},
  "FYI":    {bg:"#F8FAFC",text:"#475569",dot:"#94A3B8",border:"#E2E8F0"}
};
const STAGE_COLORS = {
  "Active RFP":       {bg:"#FEF2F2",text:"#991B1B"},
  "Active Evaluation":{bg:"#FFF7ED",text:"#9A3412"},
  "Upsell Target":    {bg:"#F0FDF4",text:"#166534"},
  "Early Outreach":   {bg:"#EFF6FF",text:"#1E40AF"},
  "Pre-Engagement":   {bg:"#F8FAFC",text:"#475569"},
  "Re-Engage":        {bg:"#FDF4FF",text:"#6B21A8"},
  "Re-Engage Q2":     {bg:"#FDF4FF",text:"#6B21A8"}
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let signalsData = {};   // { account_id: [ {urgency, type, headline, ...} ] }
let summaryData = {};   // { account_id: "summary string" }
let dealStageData = {}; // { account_id: "Qualify" | "Align" | etc }
let selectedId = null;
let activeTab = "signals";
let showPriority = false;
let sheetLastUpdated = "";

// ── CSV PARSER ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, "").toLowerCase());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    if (vals.length < headers.length) continue;
    const row = {};
    headers.forEach((h, idx) => { row[h] = (vals[idx] || "").replace(/^"|"$/g, "").trim(); });
    rows.push(row);
  }
  return rows;
}

function splitCSVLine(line) {
  const result = [];
  let cur = "", inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { result.push(cur); cur = ""; }
    else cur += ch;
  }
  result.push(cur);
  return result;
}

// ── LOAD SHEET ────────────────────────────────────────────────────────────────
async function loadSheet() {
  document.getElementById("last-fetch").textContent = "Refreshing...";
  document.getElementById("sheet-updated").textContent = "Fetching latest data...";
  showLoadingState();

  try {
    const url = `https://corsproxy.io/?url=${encodeURIComponent(SHEET_CSV_URL)}&t=${Date.now()}`;
    const res = await fetch(url);
    const text = await res.text();
    const rows = parseCSV(text);

    // Reset
    signalsData = {};
    summaryData = {};
    dealStageData = {};

    rows.forEach(row => {
      const id = row["account_id"];
      if (!id) return;
      if (!signalsData[id]) signalsData[id] = [];
      signalsData[id].push({
        urgency:    row["urgency"] || "FYI",
        type:       row["type"] || "",
        headline:   row["headline"] || "",
        date:       row["date"] || "",
        source:     row["source"] || "",
        detail:     row["detail"] || "",
        whyMatters: row["why_matters"] || "",
        play:       row["play"] || "",
        adAngle:    row["ad_angle"] || ""
      });
      if (row["summary"]) summaryData[id] = row["summary"];
      if (row["deal_stage"]) dealStageData[id] = row["deal_stage"];
    });

    const now = new Date().toLocaleString("en-US", {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
    sheetLastUpdated = now;
    document.getElementById("last-fetch").textContent = `Last updated: ${now}`;
    document.getElementById("sheet-updated").innerHTML = `<span class="updated-tag">Live from Google Sheets</span>`;

    renderSidebar();
    updatePriorityBadge();
    hideLoadingState();

  } catch(e) {
    document.getElementById("last-fetch").textContent = "Failed to load — click Reload";
    document.getElementById("sheet-updated").textContent = "Could not reach sheet";
    hideLoadingState();
    console.error("Sheet load error:", e);
  }
}

function showLoadingState() {
  document.getElementById("loading-state").style.display = "flex";
  document.getElementById("empty-state").style.display = "none";
  document.getElementById("priority-view").style.display = "none";
  document.getElementById("acct-detail").style.display = "none";
}

function hideLoadingState() {
  document.getElementById("loading-state").style.display = "none";
  if (!selectedId && !showPriority) document.getElementById("empty-state").style.display = "flex";
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById("account-list").innerHTML = ACCOUNT_ORDER.map(id => {
    const meta = ACCOUNT_META[id];
    if (!meta) return "";
    const signals = signalsData[id] || [];
    const actNow = signals.filter(s => s.urgency === "ACT NOW").length;
    const sc = STAGE_COLORS[meta.dealStage] || STAGE_COLORS["Pre-Engagement"];
    const oppStage = dealStageData[id] || "";
    const oppClass = "opp-" + oppStage.replace(/\s+/g, "-");
    const isActive = selectedId === id && !showPriority;
    return `<button class="acct-row${isActive?" active":""}" style="--color:${meta.color};--color-light:${meta.colorLight}" onclick="selectAccount('${id}')">
      <div class="name">${meta.shortName}<span>${actNow > 0 ? `<span class="acct-badge">${actNow}</span>` : ""}</span></div>
      <div class="meta">
        <span class="ae-name">${meta.ae}</span>
        <span style="font-size:10px;color:#CBD5E1">·</span>
        ${oppStage ? `<span class="opp-pill ${oppClass}">${oppStage}</span>` : `<span class="stage-pill" style="background:${sc.bg};color:${sc.text}">${meta.dealStage}</span>`}
      </div>
    </button>`;
  }).join("");
}

function updatePriorityBadge() {
  const total = Object.values(signalsData).reduce((n,sigs) => n + sigs.filter(s=>s.urgency==="ACT NOW").length, 0);
  const badge = document.getElementById("priority-badge");
  if (total > 0) { badge.textContent = total; badge.style.display = "inline"; }
  else badge.style.display = "none";
}

// ── MAIN VIEWS ────────────────────────────────────────────────────────────────
function selectAccount(id) {
  selectedId = id; showPriority = false; activeTab = "signals";
  document.getElementById("btn-priority").classList.remove("active");
  renderSidebar();
  document.getElementById("loading-state").style.display = "none";
  document.getElementById("empty-state").style.display = "none";
  document.getElementById("priority-view").style.display = "none";
  document.getElementById("acct-detail").style.display = "flex";
  renderAccountDetail();
}

function showPriorityView() {
  showPriority = true; selectedId = null;
  document.getElementById("btn-priority").classList.add("active");
  renderSidebar();
  document.getElementById("loading-state").style.display = "none";
  document.getElementById("empty-state").style.display = "none";
  document.getElementById("acct-detail").style.display = "none";
  document.getElementById("priority-view").style.display = "block";
  renderPriorityView();
}

function renderPriorityView() {
  const all = ACCOUNT_ORDER.flatMap(id => {
    const meta = ACCOUNT_META[id];
    return (signalsData[id] || []).filter(s => s.urgency === "ACT NOW").map(s => ({...s, meta, id}));
  });
  document.getElementById("priority-view").innerHTML = `
    <h2>⚡ High Priority Signals</h2>
    <p class="sub">${all.length} ACT NOW signal${all.length !== 1 ? "s" : ""} across all accounts</p>
    ${all.length === 0
      ? `<div class="no-signals">No ACT NOW signals — data may not be loaded yet. Try "Reload Data" above.</div>`
      : all.map(s => `<div class="priority-card" onclick="selectAccount('${s.id}')">
          <div class="pc-top"><span class="pc-acct" style="color:${s.meta.color}">${s.meta.name}</span><span class="pc-ae">AE: ${s.meta.ae}</span></div>
          ${urgencyBadgeHTML("ACT NOW")}
          <div class="pc-headline">${s.headline}</div>
          ${s.play ? `<div class="pc-play">→ ${s.play}</div>` : ""}
        </div>`).join("")
    }`;
}

function renderAccountDetail() {
  const meta = ACCOUNT_META[selectedId];
  if (!meta) return;
  const signals = signalsData[selectedId] || [];
  const summary = summaryData[selectedId] || "";
  const sc = STAGE_COLORS[meta.dealStage] || STAGE_COLORS["Pre-Engagement"];
  const oppStage = dealStageData[selectedId] || "";
  const oppClass = "opp-" + oppStage.replace(/\s+/g, "-");

  document.getElementById("acct-detail").innerHTML = `
    <div id="acct-header">
      <div id="acct-title-row">
        <div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <div id="acct-title">${meta.name}</div>
            ${oppStage ? `<span class="opp-pill ${oppClass}" style="font-size:13px;padding:3px 12px">${oppStage}</span>` : ""}
            <span class="stage-pill" style="background:${sc.bg};color:${sc.text};font-size:11px;padding:2px 8px;border-radius:6px">${meta.dealStage}</span>
          </div>
          <div id="acct-sub">AE: ${meta.ae} · vs ${meta.competitor} · Close: ${meta.closeTarget}</div>
          ${summary ? `<div id="acct-summary">${summary}</div>` : ""}
        </div>
        <div class="eng-dots">${[1,2,3,4,5].map(i=>`<div class="eng-dot" style="background:${i<=meta.engagementScore?"#22C55E":"#E2E8F0"}"></div>`).join("")}</div>
      </div>
      <div id="next-action-bar">
        <strong>Next Action</strong>
        <span class="na-text">${meta.nextAction.text}</span>
        <span class="na-meta">→ ${meta.nextAction.owner} · Due: ${meta.nextAction.dueDate}</span>
      </div>
      <div class="tabs" style="--acct-color:${meta.color}">
        ${["signals","contacts","outreach"].map(t=>`<button class="tab-btn${activeTab===t?" active":""}" data-tab="${t}" onclick="setTab('${t}')">${t}</button>`).join("")}
      </div>
    </div>
    <div id="tab-content" style="padding:18px 28px 24px;flex:1;overflow-y:auto">${renderTabContent()}</div>`;
}

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("tab-content").innerHTML = renderTabContent();
}

function renderTabContent() {
  const meta = ACCOUNT_META[selectedId];
  const signals = signalsData[selectedId] || [];

  if (activeTab === "signals") {
    if (signals.length === 0) return `<div style="text-align:center;padding:48px 0;color:#94A3B8"><div style="font-size:28px;margin-bottom:10px">📋</div><div>No signals in the sheet yet for this account.<br>Add rows with account_id "${selectedId}" to see them here.</div></div>`;
    return `<div style="font-size:11px;color:#94A3B8;margin-bottom:12px">Signals from Google Sheet · Updated ${sheetLastUpdated}</div>` + signals.map((s,i) => signalCardHTML(s,i)).join("");
  }

  if (activeTab === "contacts") {
    const c = meta.contacts;
    return `<div class="stat-grid">
      ${[["Total in SFDC",c.total,"#0F172A"],["LI Validated",c.liValidated,meta.color],["Working",c.working,"#F59E0B"],["Converted",c.converted,"#22C55E"]]
        .map(([l,v,col])=>`<div class="stat-card"><div class="stat-val" style="color:${col}">${v}</div><div class="stat-label">${l}</div></div>`).join("")}
    </div>
    <div class="key-contacts"><div class="key-contacts-title">Key Contacts</div>${c.keyContacts.map(k=>`<div class="contact-item">· ${k}</div>`).join("")}</div>`;
  }

  if (activeTab === "outreach") {
    const d = meta.outreachDraft;
    return `<div class="outreach-panel">
      <button class="outreach-toggle" onclick="toggleOutreach(this)">
        <span>✉ AE-Ready Outreach — ${d.channel}</span><span>▼ expand</span>
      </button>
      <div class="outreach-body">
        <div class="outreach-from">From: ${d.sender}</div>
        <div class="outreach-text">${d.body}</div>
        <button class="copy-btn" onclick="copyOutreach(this,'${selectedId}')">Copy</button>
      </div>
    </div>`;
  }
}

function toggleOutreach(btn) {
  const body = btn.nextElementSibling;
  const isOpen = body.style.display === "block";
  body.style.display = isOpen ? "none" : "block";
  btn.querySelector("span:last-child").textContent = isOpen ? "▼ expand" : "▲ collapse";
}

function copyOutreach(btn, id) {
  const meta = ACCOUNT_META[id];
  navigator.clipboard.writeText(meta.outreachDraft.body).then(() => {
    btn.textContent = "✓ Copied!"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  });
}

function signalCardHTML(s, idx) {
  const id = `sig-${selectedId}-${idx}`;
  return `<div class="signal-card">
    <div class="signal-top">
      <div style="flex:1">
        <div class="signal-meta">
          ${urgencyBadgeHTML(s.urgency)}
          ${s.type ? `<span class="signal-type">${s.type}</span>` : ""}
          ${s.date ? `<span class="signal-date">· ${s.date}</span>` : ""}
          ${s.source ? `<span class="signal-source">via ${s.source}</span>` : ""}
        </div>
        <div class="signal-headline">${s.headline}</div>
      </div>
      <button class="toggle-btn" onclick="toggleSignal('${id}')">+</button>
    </div>
    <div id="${id}" class="signal-expanded" style="display:none">
      ${s.detail ? `<p class="signal-detail">${s.detail}</p>` : ""}
      ${s.whyMatters ? `<div class="signal-block block-green"><strong>Why It Matters</strong>${s.whyMatters}</div>` : ""}
      ${s.play ? `<div class="signal-block block-blue"><strong>The Play</strong>${s.play}</div>` : ""}
      ${s.adAngle ? `<div class="signal-block block-purple"><strong>Ad Angle</strong>${s.adAngle}</div>` : ""}
    </div>
  </div>`;
}

function toggleSignal(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling.querySelector(".toggle-btn");
  const open = el.style.display !== "none";
  el.style.display = open ? "none" : "block";
  btn.textContent = open ? "+" : "−";
}

function urgencyBadgeHTML(u) {
  const cfg = URGENCY[u] || URGENCY["FYI"];
  return `<span class="urgency-badge" style="background:${cfg.bg};color:${cfg.text};border-color:${cfg.border}"><span class="urgency-dot" style="background:${cfg.dot}"></span>${u}</span>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadSheet();
