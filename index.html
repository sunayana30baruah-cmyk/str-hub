    closeTarget:"Q2–Q3 2026", engagementScore:2,

    nextAction:{text:"Michael to re-engage CMO + Consumer Insights post-Q4 earnings with AI survey summaries story.",owner:"Michael Tarter + ABM",dueDate:"Mar 31"},
    searchQuery:"TJX Companies news consumer insights strategy 2026",
    outreachDraft:{channel:"Email (Michael Tarter — via founder connection)",sender:"Michael Tarter",body:"Hi [First Name],\n\nCongrats on a strong Q4 — the results speak for themselves.\n\nI've been thinking about the survey conversation we had previously and wanted to revisit it with a different angle. At 4,900+ stores, the only way to make sense of location-level customer feedback is AI — and that's exactly what Birdeye's survey summaries do.\n\nWould you be open to a quick look? I think it lands differently now than it did before."}

const URGENCY = {
  "ACT NOW": {bg:"#FEF2F2",text:"#991B1B",dot:"#EF4444",border:"#FECACA"},
  "WATCH":   {bg:"#FFFBEB",text:"#92400E",dot:"#F59E0B",border:"#FDE68A"},
  "FYI":     {bg:"#F8FAFC",text:"#475569",dot:"#94A3B8",border:"#E2E8F0"}
};

const STAGE_COLORS = {
  "Active RFP":        {bg:"#FEF2F2",text:"#991B1B"},
  "Active Evaluation": {bg:"#FFF7ED",text:"#9A3412"},
  "Upsell Target":     {bg:"#F0FDF4",text:"#166534"},
  "Early Outreach":    {bg:"#EFF6FF",text:"#1E40AF"},
  "Pre-Engagement":    {bg:"#F8FAFC",text:"#475569"},
  "Re-Engage":         {bg:"#FDF4FF",text:"#6B21A8"},
  "Re-Engage Q2":      {bg:"#FDF4FF",text:"#6B21A8"}
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let apiKey = localStorage.getItem("birdeye_api_key") || "";
let newsMap = {};
let loadingSet = new Set();
let selectedId = null;
let activeTab = "signals";
let showPriority = false;

// ── API KEY ───────────────────────────────────────────────────────────────────
function saveApiKey() {
  const val = document.getElementById("api-key-input").value.trim();
  if (!val) return;
  apiKey = val;
  localStorage.setItem("birdeye_api_key", val);
  updateApiStatus();
}

function updateApiStatus() {
  const el = document.getElementById("api-status");
  if (apiKey && apiKey.startsWith("sk-ant-")) {
    el.textContent = "✓ Key saved";
    el.className = "ok";
  } else if (apiKey) {
    el.textContent = "⚠ Check key format";
    el.className = "";
  } else {
    el.textContent = "Not set";
    el.className = "";
  }
}

// ── NEWS FETCH ────────────────────────────────────────────────────────────────
async function fetchAccountNews(account) {
  if (!apiKey) { alert("Please enter your Anthropic API key first."); return; }

  loadingSet.add(account.id);
  renderSidebar();
  renderMain();

  const systemPrompt = `You are a B2B sales intelligence analyst for Birdeye, an AI-powered reputation and customer experience platform for multi-location businesses. Surface concise, actionable news signals for enterprise sales teams.

RULES:
- Return ONLY valid JSON, no markdown, no preamble, no code fences
- Each signal must be genuinely newsworthy and recent (prioritize 2026, then late 2025)
- Urgency: "ACT NOW" = new leadership hire, active procurement, major expansion; "WATCH" = growth signal, tech investment; "FYI" = background context
- Never mention mergers, acquisitions, or M&A in the "play" or "adAngle" fields — AE intel only
- Never mention competitor names in "adAngle" — must be safe for Demandbase display ads
- Keep headlines under 12 words`;

  const userPrompt = `Search for the latest news about "${account.name}" relevant to selling customer experience and reputation management software.

Context: competitor they use is ${account.competitor}, deal stage is ${account.dealStage}.

Return ONLY this JSON structure (no other text):
{"signals":[{"urgency":"ACT NOW|WATCH|FYI","type":"string","headline":"string under 12 words","date":"string","source":"string","detail":"string","whyMatters":"string","play":"string","adAngle":"string"}],"lastRefreshed":"${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}","summary":"string one sentence"}

Return 2-3 signals.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        system: systemPrompt,
        messages: [{ role: "user", content: userPrompt }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const textBlocks = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
    const match = textBlocks.match(/\{[\s\S]*\}/);
    if (!match) throw new Error("No JSON in response");
    newsMap[account.id] = JSON.parse(match[0]);
  } catch(e) {
    newsMap[account.id] = {
      signals: [{urgency:"FYI",type:"Error",headline:"Could not fetch news — try again",date:"Now",detail:e.message,whyMatters:"",play:"",adAngle:""}],
      summary: "Fetch failed", lastRefreshed: "—"
    };
  }

  loadingSet.delete(account.id);
  renderSidebar();
  updatePriorityBadge();
  renderMain();
}

async function refreshAll() {
  if (!apiKey) { alert("Please enter your Anthropic API key first."); return; }
  const btn = document.getElementById("btn-refresh-all");
  btn.disabled = true;
  btn.textContent = "⟳ Fetching news...";
  await Promise.all(ACCOUNTS.map(a => fetchAccountNews(a)));
  const now = new Date().toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"});
  document.getElementById("last-refresh-label").textContent = `12 accounts · Updated ${now}`;
  btn.disabled = false;
  btn.textContent = "⟳ Refresh All News";
}

// ── RENDER SIDEBAR ────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById("account-list");
  list.innerHTML = ACCOUNTS.map(a => {
    const news = newsMap[a.id];
    const actNow = news ? news.signals.filter(s => s.urgency === "ACT NOW").length : 0;
    const loading = loadingSet.has(a.id);
    const sc = STAGE_COLORS[a.dealStage] || STAGE_COLORS["Pre-Engagement"];
    const isActive = selectedId === a.id && !showPriority;
    return `<button class="acct-row${isActive?" active":""}" 
      style="--color:${a.color};--color-light:${a.colorLight}"
      onclick="selectAccount('${a.id}')">
      <div class="name">
        ${a.shortName}
        <span>
          ${loading ? `<span class="acct-loading">⟳</span>` : ""}
          ${actNow > 0 && !loading ? `<span class="acct-badge">${actNow}</span>` : ""}
        </span>
      </div>
      <div class="meta">
        <span class="ae-name">${a.ae}</span>
        <span style="font-size:10px;color:#CBD5E1">·</span>
        <span class="stage-pill" style="background:${sc.bg};color:${sc.text}">${a.dealStage}</span>
      </div>
    </button>`;
  }).join("");
}

function updatePriorityBadge() {
  const total = Object.values(newsMap).reduce((n, d) => n + (d?.signals?.filter(s => s.urgency === "ACT NOW").length || 0), 0);
  const badge = document.getElementById("priority-badge");
  if (total > 0) { badge.textContent = total; badge.style.display = "inline"; }
  else badge.style.display = "none";
}

// ── RENDER MAIN ───────────────────────────────────────────────────────────────
function renderMain() {
  const empty = document.getElementById("empty-state");
  const priority = document.getElementById("priority-view");
  const detail = document.getElementById("acct-detail");

  if (showPriority) {
    empty.style.display = "none"; detail.style.display = "none"; priority.style.display = "block";
    renderPriorityView();
  } else if (selectedId) {
    empty.style.display = "none"; priority.style.display = "none"; detail.style.display = "flex";
    renderAccountDetail();
  } else {
    priority.style.display = "none"; detail.style.display = "none"; empty.style.display = "flex";
  }
}

function selectAccount(id) {
  selectedId = id; showPriority = false; activeTab = "signals";
  const acct = ACCOUNTS.find(a => a.id === id);
  if (acct && !newsMap[id] && !loadingSet.has(id)) fetchAccountNews(acct);
  renderSidebar();
  renderMain();
}

function showPriorityView() {
  showPriority = true; selectedId = null;
  document.getElementById("btn-priority").classList.add("active");
  renderSidebar();
  renderMain();
}

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("tab-content").innerHTML = renderTabContent();
  attachTabEvents();
}

// ── PRIORITY VIEW ─────────────────────────────────────────────────────────────
function renderPriorityView() {
  const all = ACCOUNTS.flatMap(a => (newsMap[a.id]?.signals || []).filter(s => s.urgency === "ACT NOW").map(s => ({...s, account: a})));
  document.getElementById("priority-view").innerHTML = `
    <h2>⚡ High Priority Signals</h2>
    <p class="sub">${all.length} ACT NOW signal${all.length !== 1 ? "s" : ""} across all accounts</p>
    ${all.length === 0 ? `<div class="no-signals"><div class="icon">⟳</div><div>Hit "Refresh All News" to load live signals</div></div>` :
      all.map(s => `
        <div class="priority-card" onclick="selectAccount('${s.account.id}')">
          <div class="pc-top">
            <span class="pc-acct" style="color:${s.account.color}">${s.account.name}</span>
            <span class="pc-ae">AE: ${s.account.ae}</span>
          </div>
          ${urgencyBadgeHTML("ACT NOW")}
          <div class="pc-headline">${s.headline}</div>
          ${s.play ? `<div class="pc-play">→ ${s.play}</div>` : ""}
        </div>`).join("")}`;
}

// ── ACCOUNT DETAIL ────────────────────────────────────────────────────────────
function renderAccountDetail() {
  const a = ACCOUNTS.find(x => x.id === selectedId);
  if (!a) return;
  const news = newsMap[a.id];
  const sc = STAGE_COLORS[a.dealStage] || STAGE_COLORS["Pre-Engagement"];

  document.getElementById("acct-detail").innerHTML = `
    <div id="acct-header">
      <div id="acct-title-row">
        <div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <div id="acct-title">${a.name}</div>
            <span class="stage-pill" style="background:${sc.bg};color:${sc.text};font-size:12px;padding:3px 10px;border-radius:6px">${a.dealStage}</span>
          </div>
          <div id="acct-sub">AE: ${a.ae} · vs ${a.competitor} · Close: ${a.closeTarget}</div>
          ${news?.summary ? `<div id="acct-summary">${news.summary}</div>` : ""}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="eng-dots">${[1,2,3,4,5].map(i => `<div class="eng-dot" style="background:${i<=a.engagementScore?"#22C55E":"#E2E8F0"}"></div>`).join("")}</div>
          <button id="btn-refresh-one" onclick="fetchAccountNews(ACCOUNTS.find(x=>x.id==='${a.id}'))">
            ${loadingSet.has(a.id) ? "Fetching..." : "↻ Refresh"}
          </button>
        </div>
      </div>
      <div id="next-action-bar">
        <strong>Next Action</strong>
        <span class="na-text">${a.nextAction.text}</span>
        <span class="na-meta">→ ${a.nextAction.owner} · Due: ${a.nextAction.dueDate}</span>
      </div>
      <div class="tabs" style="--acct-color:${a.color}">
        ${["signals","contacts","outreach"].map(t => `<button class="tab-btn${activeTab===t?" active":""}" data-tab="${t}" onclick="setTab('${t}')">${t}</button>`).join("")}
      </div>
    </div>
    <div id="tab-content" style="padding:18px 28px 24px;flex:1;overflow-y:auto">${renderTabContent()}</div>`;

  attachTabEvents();
}

function renderTabContent() {
  const a = ACCOUNTS.find(x => x.id === selectedId);
  const news = newsMap[a.id];

  if (activeTab === "signals") {
    if (loadingSet.has(a.id)) return `<div class="loading-state"><div class="spin">⟳</div><div>Fetching latest news for ${a.shortName}...</div></div>`;
    if (!news) return `<div class="loading-state"><div style="font-size:28px;margin-bottom:10px">📰</div><div style="margin-bottom:14px">No news loaded yet</div><button class="fetch-btn" style="background:${a.color}" onclick="fetchAccountNews(ACCOUNTS.find(x=>x.id==='${a.id}'))">Fetch News Now</button></div>`;
    return `<div style="font-size:11px;color:#94A3B8;margin-bottom:12px">Last updated: ${news.lastRefreshed || "just now"}</div>` +
      news.signals.map((s, i) => signalCardHTML(s, i)).join("");
  }

  if (activeTab === "contacts") {
    const c = a.contacts;
    return `<div class="stat-grid">
      ${[["Total in SFDC",c.total,"#0F172A"],["LI Validated",c.liValidated,a.color],["Working",c.working,"#F59E0B"],["Converted",c.converted,"#22C55E"]]
        .map(([l,v,col]) => `<div class="stat-card"><div class="stat-val" style="color:${col}">${v}</div><div class="stat-label">${l}</div></div>`).join("")}
    </div>
    <div class="key-contacts">
      <div class="key-contacts-title">Key Contacts</div>
      ${c.keyContacts.map(k => `<div class="contact-item">· ${k}</div>`).join("")}
    </div>`;
  }

  if (activeTab === "outreach") {
    const d = a.outreachDraft;
    return `<div class="outreach-panel">
      <button class="outreach-toggle" onclick="toggleOutreach(this)">
        <span>✉ AE-Ready Outreach — ${d.channel}</span>
        <span>▼ expand</span>
      </button>
      <div class="outreach-body" style="display:none">
        <div class="outreach-from">From: ${d.sender}</div>
        <div class="outreach-text">${d.body}</div>
        <button class="copy-btn" onclick="copyOutreach(this,'${a.id}')">Copy</button>
      </div>
    </div>`;
  }
}

function attachTabEvents() {}

function toggleOutreach(btn) {
  const body = btn.nextElementSibling;
  const isOpen = body.style.display !== "none";
  body.style.display = isOpen ? "none" : "block";
  btn.querySelector("span:last-child").textContent = isOpen ? "▼ expand" : "▲ collapse";
}

function copyOutreach(btn, id) {
  const a = ACCOUNTS.find(x => x.id === id);
  navigator.clipboard.writeText(a.outreachDraft.body).then(() => {
    btn.textContent = "✓ Copied!"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  });
}

// ── SIGNAL CARD HTML ──────────────────────────────────────────────────────────
function signalCardHTML(s, idx) {
  const id = `sig-${selectedId}-${idx}`;
  return `<div class="signal-card">
    <div class="signal-top">
      <div style="flex:1">
        <div class="signal-meta">
          ${urgencyBadgeHTML(s.urgency)}
          <span class="signal-type">${s.type || ""}</span>
          ${s.date ? `<span class="signal-date">· ${s.date}</span>` : ""}
          ${s.source ? `<span class="signal-source">via ${s.source}</span>` : ""}
        </div>
        <div class="signal-headline">${s.headline}</div>
      </div>
      <button class="toggle-btn" onclick="toggleSignal('${id}')">▼</button>
    </div>
    <div id="${id}" class="signal-expanded" style="display:none">
      ${s.detail ? `<p class="signal-detail">${s.detail}</p>` : ""}
      ${s.whyMatters ? `<div class="signal-block block-green"><strong>Why It Matters</strong>${s.whyMatters}</div>` : ""}
      ${s.play ? `<div class="signal-block block-blue"><strong>The Play</strong>${s.play}</div>` : ""}
      ${s.adAngle ? `<div class="signal-block block-purple"><strong>Ad Angle (Demandbase)</strong>${s.adAngle}</div>` : ""}
    </div>
  </div>`;
}

function toggleSignal(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling.querySelector(".toggle-btn");
  const open = el.style.display !== "none";
  el.style.display = open ? "none" : "block";
  btn.textContent = open ? "▼" : "▲";
}

function urgencyBadgeHTML(u) {
  const cfg = URGENCY[u] || URGENCY["FYI"];
  return `<span class="urgency-badge" style="background:${cfg.bg};color:${cfg.text};border-color:${cfg.border}">
    <span class="urgency-dot" style="background:${cfg.dot}"></span>${u}</span>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
if (apiKey) document.getElementById("api-key-input").value = apiKey;
updateApiStatus();
renderSidebar();
renderMain();
</script>
